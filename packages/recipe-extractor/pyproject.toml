[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recipe-extractor"
version = "0.1.0"
description = "Turn a TikTok/Instagram/YouTube cooking video into a structured recipe + a natively-playable MP4."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["recipe", "tiktok", "instagram", "yt-dlp", "vision", "llm", "cooking"]
dependencies = [
    "httpx>=0.27",
    "yt-dlp>=2024.1.0",
]

[project.optional-dependencies]
# `pip install "recipe-extractor[service]"` to run the bundled HTTP API.
service = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "pydantic>=2",
]

[project.scripts]
recipe-extractor = "recipe_extractor.extract:main"
recipe-extractor-serve = "recipe_extractor.service:run"

[project.urls]
Homepage = "https://github.com/latintzar/social-recipes-kit"
Repository = "https://github.com/latintzar/social-recipes-kit"

[tool.hatch.build.targets.wheel]
packages = ["src/recipe_extractor"]
